<svg viewBox="0 0 1200 1000" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="ds" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0B1F33" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5B6B7B"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="1000" fill="#FFFFFF"/>
  <rect x="4" y="4" width="1192" height="992" rx="18" fill="none" stroke="#EAEEF2"/>

  <!-- Title -->
  <text x="600" y="42" text-anchor="middle" font-size="26" font-weight="700" fill="#1F2328">Azure &amp; M365 Compliance-as-Code — Architecture</text>
  <text x="600" y="66" text-anchor="middle" font-size="14" fill="#57606A">JSON rule catalogs → data-driven Pester suites → CI compliance gate</text>

  <!-- ===================== Connectors (drawn first, under boxes) ===================== -->
  <g stroke="#5B6B7B" stroke-width="2.5" fill="none">
    <line x1="320" y1="180" x2="320" y2="248" marker-end="url(#arrow)"/>
    <line x1="880" y1="180" x2="880" y2="248" marker-end="url(#arrow)"/>
    <line x1="320" y1="348" x2="320" y2="418" marker-end="url(#arrow)"/>
    <line x1="880" y1="348" x2="880" y2="418" marker-end="url(#arrow)"/>
    <line x1="600" y1="560" x2="600" y2="628" marker-end="url(#arrow)"/>
    <line x1="600" y1="740" x2="600" y2="780"/>
    <path d="M600,780 H320 V808" marker-end="url(#arrow)"/>
    <path d="M600,780 H880 V808" marker-end="url(#arrow)"/>
  </g>

  <!-- ===================== Row 1 : Rule catalogs ===================== -->
  <!-- Azure rules -->
  <rect x="90" y="90" width="460" height="90" rx="14" fill="#EAF3FB" stroke="#8FC1EA" filter="url(#ds)"/>
  <rect x="110" y="112" width="46" height="46" rx="10" fill="#0F6CBD"/>
  <text x="133" y="142" text-anchor="middle" font-size="18" font-weight="700" fill="#FFFFFF" font-family="ui-monospace, Menlo, monospace">{ }</text>
  <text x="172" y="132" font-size="18" font-weight="700" fill="#0F3B63" font-family="ui-monospace, Menlo, monospace">rules/azure.rules.json</text>
  <text x="172" y="157" font-size="12.5" fill="#3D5B75">required tags · storage hardening · NSG · approved regions</text>

  <!-- M365 rules -->
  <rect x="650" y="90" width="460" height="90" rx="14" fill="#F2ECFB" stroke="#C3ADE8" filter="url(#ds)"/>
  <rect x="670" y="112" width="46" height="46" rx="10" fill="#7A52C7"/>
  <text x="693" y="142" text-anchor="middle" font-size="18" font-weight="700" fill="#FFFFFF" font-family="ui-monospace, Menlo, monospace">{ }</text>
  <text x="732" y="132" font-size="18" font-weight="700" fill="#3E2A6B" font-family="ui-monospace, Menlo, monospace">rules/m365.rules.json</text>
  <text x="732" y="157" font-size="12.5" fill="#5B4780">CA policies · legacy auth · SSPR · guest invites</text>

  <!-- ===================== Row 2 : Test suites ===================== -->
  <!-- Azure tests -->
  <rect x="90" y="250" width="460" height="98" rx="14" fill="#EAF3FB" stroke="#8FC1EA" filter="url(#ds)"/>
  <rect x="110" y="272" width="46" height="46" rx="10" fill="#0F6CBD"/>
  <text x="133" y="302" text-anchor="middle" font-size="17" font-weight="700" fill="#FFFFFF" font-family="ui-monospace, Menlo, monospace">&gt;_</text>
  <text x="172" y="290" font-size="16" font-weight="700" fill="#0F3B63" font-family="ui-monospace, Menlo, monospace">tests/Azure.Compliance.Tests.ps1</text>
  <text x="172" y="312" font-size="12.5" fill="#3D5B75">catalog → dynamic It blocks via -ForEach</text>
  <text x="172" y="331" font-size="12" fill="#6B8299">AZ-TAG · AZ-LOC · AZ-ST · AZ-NSG</text>

  <!-- M365 tests -->
  <rect x="650" y="250" width="460" height="98" rx="14" fill="#F2ECFB" stroke="#C3ADE8" filter="url(#ds)"/>
  <rect x="670" y="272" width="46" height="46" rx="10" fill="#7A52C7"/>
  <text x="693" y="302" text-anchor="middle" font-size="17" font-weight="700" fill="#FFFFFF" font-family="ui-monospace, Menlo, monospace">&gt;_</text>
  <text x="732" y="290" font-size="16" font-weight="700" fill="#3E2A6B" font-family="ui-monospace, Menlo, monospace">tests/M365.Compliance.Tests.ps1</text>
  <text x="732" y="312" font-size="12.5" fill="#5B4780">catalog → dynamic It blocks via -ForEach</text>
  <text x="732" y="331" font-size="12" fill="#7C6AA0">M365-CA · M365-AUTHZ</text>

  <!-- ===================== Row 3 : Data-source abstraction ===================== -->
  <rect x="90" y="420" width="1020" height="140" rx="14" fill="#FFFFFF" stroke="#C7D2DE" filter="url(#ds)"/>
  <text x="120" y="452" font-size="16" font-weight="700" fill="#1F2328" font-family="ui-monospace, Menlo, monospace">tests/ComplianceData.ps1</text>
  <text x="1080" y="451" text-anchor="end" font-size="11.5" letter-spacing="1.2" fill="#98A2AE">DATA-SOURCE ABSTRACTION</text>
  <text x="600" y="474" text-anchor="middle" font-size="12.5" fill="#57606A">test suites pull cloud state here — switched by COMPLIANCE_DATA_SOURCE (default: live)</text>

  <!-- LIVE pill -->
  <rect x="118" y="488" width="444" height="60" rx="12" fill="#E7F5EC" stroke="#9CD5B0"/>
  <text x="140" y="514" font-size="15" font-weight="700" fill="#0E7A3B">LIVE</text>
  <text x="140" y="535" font-size="12.5" fill="#2F6B49">Azure — azure/login OIDC · Microsoft Graph — cert app-only</text>

  <!-- switch glyph -->
  <text x="600" y="524" text-anchor="middle" font-size="22" fill="#98A2AE">⇄</text>

  <!-- FIXTURES pill -->
  <rect x="638" y="488" width="452" height="60" rx="12" fill="#EAEFF5" stroke="#B7C4D4"/>
  <text x="660" y="514" font-size="15" font-weight="700" fill="#2E4A66">FIXTURES</text>
  <text x="660" y="535" font-size="12.5" fill="#46586C">tests/fixtures/ — committed reference tenant · no cloud account</text>

  <!-- ===================== Row 4 : Runner ===================== -->
  <rect x="320" y="630" width="560" height="110" rx="14" fill="#17324F" stroke="#0E2237" filter="url(#ds)"/>
  <circle cx="372" cy="685" r="26" fill="#1E88E5"/>
  <path d="M360,685 l8,9 l16,-18" fill="none" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="414" y="680" font-size="20" font-weight="700" fill="#FFFFFF" font-family="ui-monospace, Menlo, monospace">scripts/Invoke-ComplianceRun.ps1</text>
  <text x="414" y="706" font-size="13.5" fill="#AFC6DD">Pester v5  ·  NUnit XML output  ·  exit code = violation count</text>

  <!-- ===================== Row 5 : CI gates ===================== -->
  <!-- GitHub Actions -->
  <rect x="90" y="810" width="460" height="132" rx="14" fill="#FFFFFF" stroke="#C7D2DE" filter="url(#ds)"/>
  <rect x="110" y="832" width="52" height="52" rx="12" fill="#1F2328"/>
  <circle cx="136" cy="856" r="13" fill="none" stroke="#FFFFFF" stroke-width="3"/>
  <circle cx="136" cy="856" r="4" fill="#FFFFFF"/>
  <text x="178" y="850" font-size="15.5" font-weight="700" fill="#1F2328" font-family="ui-monospace, Menlo, monospace">.github/workflows/compliance.yml</text>
  <text x="178" y="872" font-size="12.5" fill="#3D4A57">azure/login via OIDC — id-token: write</text>
  <text x="178" y="891" font-size="12.5" fill="#3D4A57">PR gate (critical) + on-demand (workflow_dispatch)</text>
  <rect x="178" y="903" width="212" height="23" rx="11.5" fill="#E7F5EC" stroke="#9CD5B0"/>
  <text x="284" y="919" text-anchor="middle" font-size="11" font-weight="600" fill="#0E7A3B">OIDC · no stored secrets</text>

  <!-- Azure Pipelines -->
  <rect x="650" y="810" width="460" height="132" rx="14" fill="#FFFFFF" stroke="#C7D2DE" filter="url(#ds)"/>
  <rect x="670" y="832" width="52" height="52" rx="12" fill="#0F6CBD"/>
  <path d="M687,872 l14,-32 l7,0 l-14,32 z" fill="#FFFFFF"/>
  <path d="M700,872 l14,-32 l7,0 l-14,32 z" fill="#8FC1EA"/>
  <text x="738" y="850" font-size="15.5" font-weight="700" fill="#1F2328" font-family="ui-monospace, Menlo, monospace">pipelines/azure-pipelines.yml</text>
  <text x="738" y="872" font-size="12.5" fill="#3D4A57">AzurePowerShell@5 — workload identity</text>
  <text x="738" y="891" font-size="12.5" fill="#3D4A57">PublishTestResults@2 → Tests tab</text>
  <rect x="738" y="903" width="196" height="23" rx="11.5" fill="#EAF3FB" stroke="#8FC1EA"/>
  <text x="836" y="919" text-anchor="middle" font-size="11" font-weight="600" fill="#0F3B63">federated · no secret</text>
</svg>
