name: Compliance gate

on:
  pull_request:           # rule-catalog changes are validated before merge
  schedule:
    - cron: '0 18 * * *'  # nightly full sweep, 04:00 AEST
  workflow_dispatch:

permissions:
  id-token: write         # OIDC federated login — no stored Azure secrets
  contents: read
  checks: write
  pull-requests: write    # let the test-result action post its summary comment

jobs:
  compliance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          enable-AzPSSession: true

      - name: Install modules
        shell: pwsh
        run: Install-Module Pester, Az.Resources, Az.Storage, Az.Network, Microsoft.Graph.Authentication -Force -Scope CurrentUser

      - name: Connect Microsoft Graph (app-only)
        shell: pwsh
        env:
          GRAPH_CERT_PFX_B64: ${{ secrets.GRAPH_CERT_PFX_B64 }}
          GRAPH_CLIENT_ID: ${{ secrets.GRAPH_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          $bytes = [Convert]::FromBase64String($env:GRAPH_CERT_PFX_B64)
          $cert = [System.Security.Cryptography.X509Certificates.X509Certificate2]::new($bytes)
          Connect-MgGraph -TenantId $env:AZURE_TENANT_ID -ClientId $env:GRAPH_CLIENT_ID -Certificate $cert -NoWelcome

      # PR = critical rules only (fast gate); nightly/dispatch = everything.
      - name: Run compliance suite
        shell: pwsh
        run: |
          $tagArgs = if ('${{ github.event_name }}' -eq 'pull_request') { @{ Tag = 'critical' } } else { @{} }
          ./scripts/Invoke-ComplianceRun.ps1 -Suite all @tagArgs

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: results/*.xml
          check_name: Compliance results
